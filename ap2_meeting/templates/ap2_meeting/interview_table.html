<div id="alert-container" class="m-3"></div>
<div class="d-flex justify-content-between mt-3 mb-3">

  <button id="prev-week" class="btn btn-sm btn-primary mb-0"><i class="fas fa-angle-left"></i> Previous Week</button>
  <button id="current-week" class="btn btn-sm btn-warning mb-0">Current Week</button>
  <button id="next-week" class="btn btn-sm btn-primary mb-0">Next Week <i class="fas fa-angle-right"></i></button>

  <!-- Start Day of week Dropdown -->
  <div class="col-md-2">
    <label class="form-label">Start day of week</label>
    <select id="startDayOfWeek" name="startDayOfWeek" class="form-control form-select form-select-sm" required>
      <option value="0">Sunday</option>
      <option value="1">Monday</option>
      <option value="2">Tuesday</option>
      <option value="3">Wednesday</option>
      <option value="4">Thursday</option>
      <option value="5">Friday</option>
      <option value="6">Saturday</option>
    </select>
  </div>

  <label for="timezone-select">Select Time Zone:</label>
  <select id="timezone-select">
    <option value="UTC">UTC</option>
    <option value="Europe/London">London (GMT)</option>
    <option value="Asia/Tehran">Tehran (IRST)</option>
    <option value="Europe/Berlin">Berlin (DST)</option>
    <option value="America/New_York">New York (EST)</option>
    <option value="Asia/Tokyo">Tokyo (JST)</option>
    <hr>
    <!-- Add more time zones as needed -->
  </select>
</div>
<!-- Guide Box -->
<div class="d-flex align-items-center guide-box me-3">
  <div class="guide-item me-3">
    <span class="guide-booked"></span>
    <label>Booked</label>
  </div>
  <div class="guide-item me-3">
    <span class="guide-booked-temp"></span>
    <label>Temp Book</label>
  </div>
  <div class="guide-item me-3">
    <span class="guide-disabled"></span>
    <label>Unavailable</label>
  </div>
  <div class="guide-item me-3">
    <span class="guide-tutor-available"></span>
    <label>Available</label>
  </div>
  <div class="guide-item me-3">
    <span class="guide-selected"></span>
    <label>Selected</label>
  </div>
</div>
<form id="schedule-form" action="#" method="post">
  {% csrf_token %}
  {% if 'dashboard' in request.path %}
      <input type="hidden" id="providerUId" value="{{ request.user.pk }}">
  {% elif 'interview' in request.path %}
      <input type="hidden" id="providerUId" value="{{ request.user.pk }}">
  {% else %}
    <input type="hidden" id="tutor_id" value="{{ tutor_single.id }}">
  {% endif %}
  <table id="schedule-table">
    <thead>
    <tr>
      <th>Time</th>
      <!-- Weekday headers will be generated by JavaScript -->
    </tr>
    </thead>
    <tbody style="max-height: 200px; width: auto">
    <!-- Time slots will be generated by JavaScript -->
    </tbody>
  </table>
  <div class="d-flex justify-content-between mt-3">
    <button id="clear-button" type="button" class="btn btn-sm btn-danger-soft mb-3">Clear Selection</button>
    <button id="submit-button" type="button" class="btn btn-sm btn-primary mb-3">Confirm</button>
  </div>
</form>
